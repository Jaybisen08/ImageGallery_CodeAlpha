<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Gallery</title>
    <link rel="stylesheet" href="gallery.css">
</head>
<body>

    <!-- Navbar -->
    <nav>
        <div class="logo">
    <img src="Logo.png" alt="SpaceVerse Logo">
    <span>SpaceVerse</span>
</div>
    </nav>

    <!-- Header -->
    <header>
        <h1>Explore The Cosmic Gallery</h1>
        <p>Discover planets, galaxies, rockets, satellites, astronauts, and black holes.</p>
    </header>

    <!-- Filters -->
    <div class="filters">
        <button onclick="filterImages('all')">All</button>
        <button onclick="filterImages('planet')">Planets</button>
        <button onclick="filterImages('galaxy')">Galaxies</button>
        <button onclick="filterImages('rocket')">Rockets</button>
        <button onclick="filterImages('satellite')">Satellites</button>
        <button onclick="filterImages('astronaut')">Astronauts</button>
        <button onclick="filterImages('blackhole')">Black Holes</button>
    </div>

    <!-- Gallery -->
    <div class="gallery">

        <!-- PLANETS -->
        <div class="image-card planet"><img src="Saturn 3.jpg" onclick="openLightbox(0)"></div>
        <div class="image-card planet"><img src="Mars 1.jpg" onclick="openLightbox(1)"></div>
        <div class="image-card planet"><img src="Earth 1.jpg" onclick="openLightbox(2)"></div>
        <div class="image-card planet"><img src="Uranus.jpg" onclick="openLightbox(0)"></div>
        <div class="image-card planet"><img src="Jupiter.jpg" onclick="openLightbox(1)"></div>
        <div class="image-card planet"><img src="Neptune.jpg" onclick="openLightbox(2)"></div>
        <div class="image-card planet"><img src="ExpoPlanet.jpg" onclick="openLightbox(0)"></div>
        <div class="image-card planet"><img src="venus.jpg" onclick="openLightbox(1)"></div>
        

        <!-- GALAXIES -->
        <div class="image-card galaxy"><img src="galaxy 5.jpg" onclick="openLightbox(3)"></div>
        <div class="image-card galaxy"><img src="galaxy.jpg" onclick="openLightbox(4)"></div>
        <div class="image-card galaxy"><img src="galaxy 6.jpg" onclick="openLightbox(5)"></div>

        <!-- ROCKETS -->
        <div class="image-card rocket"><img src="rocket 8.jpg" onclick="openLightbox(6)"></div>
        <div class="image-card rocket"><img src="rocket.jpg" onclick="openLightbox(7)"></div>

        <!-- SATELLITES -->
        <div class="image-card satellite"><img src="satellite 10.jpg" onclick="openLightbox(8)"></div>
        <div class="image-card satellite"><img src="Satellite.jpg" onclick="openLightbox(9)"></div>
        


        <!-- ASTRONAUTS -->
        <div class="image-card astronaut"><img src="astronauts 14.jpg" onclick="openLightbox(10)"></div>
        <div class="image-card astronaut"><img src="astronauts 13.jpg" onclick="openLightbox(11)"></div>
        <div class="image-card astronaut"><img src="Astronauts.jpg" onclick="openLightbox(11)"></div>

        <!-- BLACK HOLES -->
        <div class="image-card blackhole"><img src="black hole 13.jpg" onclick="openLightbox(12)"></div>
        <div class="image-card blackhole"><img src="Black Hole.jpg" onclick="openLightbox(13)"></div>

    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="close" onclick="closeLightbox()">×</span>
        <button class="prev" onclick="changeImage(-1)">❮</button>
        <img id="lightbox-img">
        <button class="next" onclick="changeImage(1)">❯</button>
    </div>

    <!-- Footer -->
    <footer>
        <p>Made with ❤️ by Jay Bisen | CodeAlpha Frontend Internship</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
